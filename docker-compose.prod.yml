services:
  gateway:
    build: .
    image: streamflow-gateway:local
    container_name: streamflow-gateway
    restart: unless-stopped
    cpus: "${GATEWAY_CPUS:-1.6}"
    mem_limit: "${GATEWAY_MEM_LIMIT:-1500m}"
    pids_limit: ${GATEWAY_PIDS_LIMIT:-256}
    environment:
      GATEWAY_HOST: ${GATEWAY_HOST:-0.0.0.0}
      GATEWAY_PORT: ${GATEWAY_PORT:-8000}
      ZLM_HTTP_ORIGIN: ${ZLM_HTTP_ORIGIN:-http://zlm:80}
      ZLM_RTMP_ORIGIN: ${ZLM_RTMP_ORIGIN:-rtmp://zlm:1935/live}
      RTSP_PUSH_ORIGIN: ${RTSP_PUSH_ORIGIN:-rtsp://zlm:554/live}
      MAX_UPSTREAMS: ${MAX_UPSTREAMS:-50}
      MAX_VIEWERS: ${MAX_VIEWERS:-500}
      MAX_TRANSCODE_STREAMS: ${MAX_TRANSCODE_STREAMS:-2}
      TRANSCODE_HEIGHT: ${TRANSCODE_HEIGHT:-540}
      CLEANUP_AFTER_SECS: ${CLEANUP_AFTER_SECS:-120}
      VIEWER_BUFFER_BYTES: ${VIEWER_BUFFER_BYTES:-262144}
      STREAMFLOW_SPAWN_PROCESSES: ${STREAMFLOW_SPAWN_PROCESSES:-1}
      STREAMFLOW_H265_DIRECT: ${STREAMFLOW_H265_DIRECT:-1}
      STREAMFLOW_H264_FALLBACK: ${STREAMFLOW_H264_FALLBACK:-1}
    ports:
      - "${GATEWAY_PORT:-8000}:${GATEWAY_PORT:-8000}"
    depends_on:
      - zlm
    networks:
      - streamflow

  zlm:
    image: zlmediakit/zlmediakit:master
    container_name: streamflow-zlm
    restart: unless-stopped
    cpus: "${ZLM_CPUS:-0.3}"
    mem_limit: "${ZLM_MEM_LIMIT:-256m}"
    pids_limit: ${ZLM_PIDS_LIMIT:-128}
    networks:
      - streamflow

networks:
  streamflow:
    ipam:
      config:
        - subnet: 10.77.0.0/24
